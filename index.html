<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriSmart AI</title>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        document.body.innerHTML = '<div style="color:red;padding:20px;z-index:9999;position:absolute;background:white;top:0;left:0;width:100%;height:100%; overflow:auto;">' + 
          '<h1>CLIENT ERROR</h1>' +
          '<p>' + msg + '</p>' +
          '<pre>' + (error ? error.stack : '') + '</pre>' +
        '</div>';
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color:red;padding:20px;z-index:9999;position:absolute;background:white;top:0;left:0;width:100%;height:100%; overflow:auto;">' + 
          '<h1>UNHANDLED PROMISE REJECTION</h1>' +
          '<p>' + (event.reason ? event.reason.toString() : '') + '</p>' +
          '<pre>' + (event.reason && event.reason.stack ? event.reason.stack : '') + '</pre>' +
        '</div>';
      });
      // Try to unregister any old service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
